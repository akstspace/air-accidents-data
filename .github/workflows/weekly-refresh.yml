name: Weekly refresh aircraft dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write

concurrency:
  group: aircraft-dataset-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install scraper dependencies
        run: uv sync --project scraper

      - name: Refresh dataset
        run: uv run --project scraper python scripts/refresh_dataset.py

      - name: Commit refreshed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add accidents.jsonl last_updated.json
          if git diff --cached --quiet; then
            echo "No dataset changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh aircraft dataset"
          git push
